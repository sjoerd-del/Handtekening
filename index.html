document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

icode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"b892643f-44bb-42d9-9e16-db60cd8f00ae\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"29d4d4ac-5ded-47e6-9e1f-b61cd5e2fb89\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"f08218eb-f9cb-4390-85bb-316805b3b44b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"034111cd-9f32-44f9-b751-3be89e8c99ae\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- Color · palette ---------- */\n  --deep:      #0a2540;   /* anchor · engineering arc · Pantone 540 C */\n  --terra:     #c4633a;   /* signature · design arc · the dot · Pantone 7586 C */\n  --lightblue: #2dafe5;   /* sub-accent, on dark only */\n  --paper:     #f6f1ea;   /* primary background · uncoated cream */\n  --charcoal:  #14171a;   /* body text */\n\n  /* ---------- Color · semantic ---------- */\n  --fg-1:        var(--charcoal);        /* primary text */\n  --fg-2:        rgba(20,23,26,0.72);    /* secondary text */\n  --fg-muted:    rgba(20,23,26,0.55);    /* captions, meta */\n  --fg-accent:   var(--terra);           /* accent text, links on hover */\n  --bg-1:        var(--paper);           /* page background */\n  --bg-surface:  #ffffff;                /* cards, panels */\n  --bg-deep:     var(--deep);            /* inverted / hero blocks */\n  --line:        rgba(20,23,26,0.12);    /* borders, dividers */\n  --line-2:      rgba(20,23,26,0.07);    /* hairlines */\n\n  /* On dark surfaces */\n  --fg-on-deep:     #ffffff;\n  --fg-on-deep-2:   rgba(255,255,255,0.72);\n  --line-on-deep:   rgba(255,255,255,0.14);\n\n  /* ---------- Type · families ---------- */\n  --font-display: 'Montserrat', system-ui, sans-serif;\n  --font-accent:  'Fraunces', Georgia, serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, monospace;\n\n  /* ---------- Type · scale (1280–1440 desktop) ---------- */\n  --t-display: 76px;   --t-display-lh: 0.98; /* @kind font */\n  --t-h1:      40px;   --t-h1-lh: 1.05; /* @kind font */\n  --t-h2:      28px;   --t-h2-lh: 1.1; /* @kind font */\n  --t-h3:      20px;   --t-h3-lh: 1.25; /* @kind font */\n  --t-body:    17px;   --t-body-lh: 1.65; /* @kind font */\n  --t-small:   14px;   --t-small-lh: 1.5; /* @kind font */\n  --t-label:   11px;   --t-label-ls: 0.18em;\n\n  /* ---------- Radii · shadow · spacing ---------- */\n  --r-sm: 10px;\n  --r-md: 14px;\n  --r-lg: 18px;\n  --r-pill: 999px;\n  --shadow-card: 0 1px 2px rgba(20,23,26,0.04), 0 8px 24px rgba(20,23,26,0.06);\n  --shadow-lift: 0 4px 8px rgba(20,23,26,0.06), 0 18px 48px rgba(20,23,26,0.10);\n  --space-unit: 4px;   /* spacing scale: multiples of 4 — 4 8 12 16 24 32 48 64 84 */\n}\n\n/* ===========================================================\n   SEMANTIC TYPOGRAPHY\n   Apply via element or class. Headings are Montserrat;\n   accent words inside headings use <em> → Fraunces italic terracotta.\n   =========================================================== */\n.t-display, h1.display {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-display);\n  line-height: var(--t-display-lh);\n  letter-spacing: -0.025em;\n  color: var(--deep);\n}\nh1, .h1 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-h1);\n  line-height: var(--t-h1-lh);\n  letter-spacing: -0.02em;\n  color: var(--deep);\n}\nh2, .h2 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-h2);\n  line-height: var(--t-h2-lh);\n  letter-spacing: -0.015em;\n  color: var(--deep);\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-h3);\n  line-height: var(--t-h3-lh);\n  letter-spacing: -0.01em;\n  color: var(--deep);\n}\n/* Accent words inside headings */\nh1 em, h2 em, h3 em, .t-display em, .accent-word {\n  font-family: var(--font-accent);\n  font-style: italic;\n  font-weight: 500;\n  color: var(--terra);\n}\np, .body {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: var(--t-body);\n  line-height: var(--t-body-lh);\n  color: var(--fg-2);\n}\nsmall, .small {\n  font-size: var(--t-small);\n  line-height: var(--t-small-lh);\n  color: var(--fg-muted);\n}\n.lead {\n  font-size: 19px;\n  line-height: 1.6;\n  color: var(--fg-2);\n}\n/* Mono label — kicker / spec / eyebrow */\n.label, .mono-label {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: var(--t-label);\n  letter-spacing: var(--t-label-ls);\n  text-transform: uppercase;\n  color: var(--fg-muted);\n}\n.label.accent, .mono-label.accent { color: var(--terra); }\n\ncode, .code, kbd {\n  font-family: var(--font-mono);\n  font-size: 0.9em;\n  letter-spacing: 0.01em;\n  color: var(--deep);\n  background: rgba(20,23,26,0.05);\n  padding: 0.12em 0.4em;\n  border-radius: 6px;\n}\n<\u002Fstyle>\n  <style>/* ===========================================================\n   Cadform — Design System · gedeelde stijl\n   Tokens, logo-constructie, typografie, componenten.\n   =========================================================== */\n\n:root {\n  /* Kleur — palet */\n  --deep:      #0a2540;   /* anker · engineering-boog · Pantone 540 C */\n  --terra:     #c4633a;   /* signatuur · ontwerp-boog · punt · Pantone 7586 C */\n  --lightblue: #2dafe5;   /* sub-accent op donker */\n  --paper:     #f6f1ea;   /* achtergrond hoofdvariant · uncoated cream */\n  --charcoal:  #14171a;   /* bodytekst */\n\n  /* Afgeleide tonen */\n  --line:    rgba(20,23,26,0.12);\n  --line-2:  rgba(20,23,26,0.07);\n  --muted:   rgba(20,23,26,0.55);\n  --muted-2: rgba(20,23,26,0.72);\n  --surface: #ffffff;\n\n  /* Type */\n  --font-display: 'Montserrat', system-ui, sans-serif;\n  --font-accent:  'Fraunces', Georgia, serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, monospace;\n}\n\n* { box-sizing: border-box; }\n\n/* ---------- Mono label ---------- */\n.mono-label {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n.mono-label.accent { color: var(--terra); }\n\n/* ===========================================================\n   LOGO-CONSTRUCTIE  (1 font-size op de lockup stuurt de maat)\n   =========================================================== */\n.bogen { display: inline-block; line-height: 0; }\n.bogen svg { display: block; height: 1em; width: auto; overflow: visible; }\n.bogen .boog-a { stroke: var(--deep); }\n.bogen .boog-b { stroke: var(--terra); }\n\n.word {\n  font-family: var(--font-display);\n  font-weight: 800;\n  letter-spacing: -0.005em;\n  line-height: 1;\n  color: var(--deep);\n  white-space: nowrap;\n}\n.word .dot {\n  display: inline-block;\n  width: 0.16em; height: 0.16em;\n  background: var(--terra);\n  border-radius: 50%;\n  margin-left: 0.05em;\n  vertical-align: baseline;\n}\n\n/* Horizontaal: beeldmerk = 0.82em (1.15× cap-height), gap 0.32em, mark op x-hoogte */\n.lockup-h {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.32em;\n  line-height: 1;\n}\n.lockup-h .mark { font-size: 0.82em; transform: translateY(0.10em); }\n.lockup-h .word { font-size: 1em; }\n\n/* Stacked: beeldmerk = 1.4em, gap 0.16em */\n.lockup-v {\n  display: inline-flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 0.16em;\n  line-height: 1;\n}\n.lockup-v .mark { font-size: 1.4em; }\n.lockup-v .word { font-size: 1em; }\n\n/* ---------- Logo-varianten ---------- */\n.var-dark  .boog-a { stroke: #fff; }\n.var-dark  .boog-b { stroke: var(--terra); }\n.var-dark  .word   { color: #fff; }\n.var-dark  .dot    { background: var(--terra); }\n\n.var-mono  .boog-a, .var-mono  .boog-b { stroke: var(--deep); }\n.var-mono  .word   { color: var(--deep); }\n.var-mono  .dot    { background: var(--deep); }\n\n.var-white .boog-a, .var-white .boog-b { stroke: #fff; }\n.var-white .word   { color: #fff; }\n.var-white .dot    { background: #fff; }\n\n.var-terra .boog-a, .var-terra .boog-b { stroke: var(--terra); }\n.var-terra .word   { color: var(--terra); }\n.var-terra .dot    { background: var(--terra); }\n\n/* ===========================================================\n   COMPONENTEN — knoppen, links, nav\n   =========================================================== */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 14px;\n  line-height: 1;\n  padding: 14px 26px;\n  border-radius: 999px;\n  border: 1.5px solid transparent;\n  cursor: pointer;\n  text-decoration: none;\n  transition: filter 0.15s ease, background 0.15s ease, color 0.15s ease;\n}\n.btn-primary   { background: var(--deep);  color: #fff; }\n.btn-primary:hover   { filter: brightness(1.18); }\n.btn-accent    { background: var(--terra); color: #fff; }\n.btn-accent:hover    { filter: brightness(1.08); }\n.btn-secondary { background: transparent; color: var(--deep); border-color: var(--deep); }\n.btn-secondary:hover { background: var(--deep); color: #fff; }\n.btn-ghost     { background: transparent; color: var(--deep); padding: 14px 4px; border-radius: 0; border-bottom: 2px solid var(--deep); }\n.btn-sm { padding: 10px 18px; font-size: 13px; }\n\n/* Tekstlink */\n.tlink {\n  color: var(--deep);\n  text-decoration: none;\n  font-weight: 600;\n  border-bottom: 2px solid rgba(196,99,58,0.35);\n  padding-bottom: 1px;\n  transition: border-color 0.15s ease, color 0.15s ease;\n}\n.tlink:hover { color: var(--terra); border-bottom-color: var(--terra); }\n\n/* Nav-item */\n.navlink {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 14px;\n  color: var(--charcoal);\n  text-decoration: none;\n  transition: color 0.15s ease;\n}\n.navlink:hover { color: var(--terra); }\n\n/* Webheader-voorbeeld */\n.web-nav {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 32px;\n  padding: 20px 28px;\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: 14px;\n}\n.web-nav .menu { display: flex; align-items: center; gap: 30px; }\n<\u002Fstyle>\n  <script src=\"e97f8c0b-eb3e-40a7-80aa-15addd2cf0ea\"><\u002Fscript>\n  <style>\n    body { margin:0; background:#f6f1ea; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh; background:#f6f1ea; font-family:'Montserrat',Arial,sans-serif; padding:64px 64px 96px;\">\n  <div style=\"max-width:880px; margin:0 auto;\">\n\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#c4633a; margin-bottom:14px;\">Handtekening · variant A · productie<\u002Fdiv>\n    <h1 style=\"font-family:'Montserrat',sans-serif; font-weight:800; font-size:38px; line-height:1.05; letter-spacing:-0.02em; color:#0a2540; margin:0 0 18px;\">Echte tekst, geen <em style=\"font-family:'Fraunces',Georgia,serif; font-style:italic; font-weight:500; color:#c4633a;\">plaatje<\u002Fem>.<\u002Fh1>\n    <p style=\"font-size:16px; line-height:1.65; color:rgba(20,23,26,0.72); max-width:620px; margin:0 0 14px;\">Alles in de handtekening is gewone HTML-tekst: selecteerbaar, doorzoekbaar, toegankelijk en per collega aan te passen. Het enige beeld is het logo — een kleine, gehoste PNG.<\u002Fp>\n    <p style=\"font-size:14px; line-height:1.6; color:rgba(20,23,26,0.6); max-width:620px; margin:0;\">Web-fonts laden niet in mail, dus de tekst valt netjes terug: Montserrat&nbsp;→&nbsp;Arial, en de cursieve functietitel&nbsp;→&nbsp;Georgia-cursief. De opmaak blijft staan.<\u002Fp>\n\n    <!-- ===== PERSONALISEER ===== -->\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#c4633a; margin:44px 0 12px;\">1 · Vul je gegevens in<\u002Fdiv>\n    <div style=\"background:#fff; border:1px solid rgba(20,23,26,0.12); border-radius:18px; padding:26px 28px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px 22px;\">\n        <label style=\"display:block;\">\n          <span style=\"display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(20,23,26,0.55);\">Naam<\u002Fspan>\n          <input value=\"{{ name }}\" oninput=\"{{ onName }}\" style=\"width:100%; box-sizing:border-box; font-family:'Montserrat',Arial,sans-serif; font-size:14px; color:#14171a; background:#f6f1ea; border:1px solid #dcd5ca; border-radius:10px; padding:11px 13px; margin-top:6px; outline:none;\" style-focus=\"border-color:#0a2540\">\n        <\u002Flabel>\n        <label style=\"display:block;\">\n          <span style=\"display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(20,23,26,0.55);\">Functie<\u002Fspan>\n          <input value=\"{{ role }}\" oninput=\"{{ onRole }}\" style=\"width:100%; box-sizing:border-box; font-family:'Montserrat',Arial,sans-serif; font-size:14px; color:#14171a; background:#f6f1ea; border:1px solid #dcd5ca; border-radius:10px; padding:11px 13px; margin-top:6px; outline:none;\" style-focus=\"border-color:#0a2540\">\n        <\u002Flabel>\n        <label style=\"display:block;\">\n          <span style=\"display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(20,23,26,0.55);\">Mobiel<\u002Fspan>\n          <input value=\"{{ phone }}\" oninput=\"{{ onPhone }}\" style=\"width:100%; box-sizing:border-box; font-family:'Montserrat',Arial,sans-serif; font-size:14px; color:#14171a; background:#f6f1ea; border:1px solid #dcd5ca; border-radius:10px; padding:11px 13px; margin-top:6px; outline:none;\" style-focus=\"border-color:#0a2540\">\n        <\u002Flabel>\n        <label style=\"display:block;\">\n          <span style=\"display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(20,23,26,0.55);\">E-mailadres<\u002Fspan>\n          <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" style=\"width:100%; box-sizing:border-box; font-family:'Montserrat',Arial,sans-serif; font-size:14px; color:#14171a; background:#f6f1ea; border:1px solid #dcd5ca; border-radius:10px; padding:11px 13px; margin-top:6px; outline:none;\" style-focus=\"border-color:#0a2540\">\n        <\u002Flabel>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px; color:rgba(20,23,26,0.6); margin-top:16px;\">De handtekening hieronder verandert direct mee. Logo, adres en social links staan voor iedereen vast.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== PREVIEW ===== -->\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(20,23,26,0.55); margin:44px 0 12px;\">2 · Voorbeeld · zoals in de mail<\u002Fdiv>\n    <div style=\"background:#fff; border:1px solid rgba(20,23,26,0.12); border-radius:18px; box-shadow:0 8px 24px rgba(20,23,26,0.06); padding:34px 34px 38px;\">\n      <div style=\"font-family:Georgia,serif; font-style:italic; font-size:15px; color:rgba(20,23,26,0.55); margin-bottom:22px;\">Met vriendelijke groet,<\u002Fdiv>\n\n      <!-- ====== DE HANDTEKENING (kopieerbron) ====== -->\n      <table ref=\"{{ sigRef }}\" data-screen-label=\"Handtekening A\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" role=\"presentation\" style=\"border-collapse:separate;\">\n        <tbody><tr>\n          <td bgcolor=\"#f6f1ea\" style=\"background-color:#f6f1ea; border:1px solid #dcd5ca; border-radius:16px; padding:24px 28px; font-family:Arial,'Helvetica Neue',sans-serif;\">\n            <img src=\"e4eac472-8bee-4a50-a737-c9d26d141054\" width=\"190\" height=\"27\" alt=\"Cadform\" style=\"display:block; border:0;\">\n            <div style=\"width:44px; height:2px; background:#c4633a; margin:18px 0 16px; font-size:0; line-height:0;\">&nbsp;<\u002Fdiv>\n            <div style=\"font-weight:bold; font-size:16px; color:#0a2540;\">{{ name }}<\u002Fdiv>\n            <div style=\"font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:14px; color:#c4633a; margin-top:2px;\">{{ role }}<\u002Fdiv>\n            <div style=\"font-size:12px; color:#14171a; margin-top:16px; line-height:1.7;\">\n              <a href=\"{{ telHref }}\" style=\"color:#14171a; text-decoration:none;\">{{ phone }}<\u002Fa>\n              <span style=\"color:#bdb6ac; padding:0 6px;\">·<\u002Fspan>\n              <a href=\"{{ mailHref }}\" style=\"color:#c4633a;\">{{ email }}<\u002Fa>\n              <span style=\"color:#bdb6ac; padding:0 6px;\">·<\u002Fspan>\n              <a href=\"https://cadform.nl\" style=\"color:#c4633a;\">cadform.nl<\u002Fa>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; color:#6b6760; margin-top:5px;\">Rembrandtlaan 14D, 3723&nbsp;BJ Bilthoven<\u002Fdiv>\n            <div style=\"border-top:1px solid #dcd5ca; margin-top:14px; padding-top:12px; font-size:11.5px; letter-spacing:0.01em;\">\n              <a href=\"https://www.linkedin.com/company/1710555/\" style=\"color:#0a2540; text-decoration:none; font-weight:bold;\">LinkedIn<\u002Fa>\n              <span style=\"color:#bdb6ac; padding:0 7px;\">·<\u002Fspan>\n              <a href=\"https://www.instagram.com/cadform/\" style=\"color:#0a2540; text-decoration:none; font-weight:bold;\">Instagram<\u002Fa>\n              <span style=\"color:#bdb6ac; padding:0 7px;\">·<\u002Fspan>\n              <a href=\"https://www.facebook.com/CADFORM/\" style=\"color:#0a2540; text-decoration:none; font-weight:bold;\">Facebook<\u002Fa>\n            <\u002Fdiv>\n          <\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n\n    <!-- ===== ACTIES ===== -->\n    <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:14px; margin-top:24px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(20,23,26,0.55); width:100%;\">3 · Kopieer &amp; plak in Gmail<\u002Fspan>\n      <button onclick=\"{{ copy }}\" style=\"font-family:'Montserrat',sans-serif; font-weight:600; font-size:14px; color:#fff; background:#0a2540; border:none; border-radius:999px; padding:13px 26px; cursor:pointer; transition:filter 0.15s ease;\" style-hover=\"filter:brightness(1.18)\">{{ copyLabel }}<\u002Fbutton>\n      <a href=\"assets/cadform-logo-horizontaal.png\" download=\"cadform-logo.png\" style=\"font-family:'Montserrat',sans-serif; font-weight:600; font-size:14px; color:#0a2540; background:transparent; border:1.5px solid #0a2540; border-radius:999px; padding:11px 24px; text-decoration:none; transition:background 0.15s ease,color 0.15s ease;\" style-hover=\"background:#0a2540;color:#fff\">Download logo (PNG)<\u002Fa>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(20,23,26,0.5);\">{{ copyHint }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ===== CODE ===== -->\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(20,23,26,0.55); margin:44px 0 12px;\">De broncode · voor wie 'm host<\u002Fdiv>\n    <div style=\"display:flex; gap:12px; align-items:flex-start; background:#fff; border:1px solid rgba(20,23,26,0.12); border-left:3px solid #0a2540; border-radius:12px; padding:16px 18px; margin-bottom:14px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#0a2540; padding-top:1px;\">Logo<\u002Fdiv>\n      <div style=\"font-size:13px; line-height:1.6; color:#14171a;\">Het logo verwijst nu naar de gehoste <strong style=\"color:#0a2540;\">PNG<\u002Fstrong> op je Webflow-CDN — dat toont Gmail wel (een SVG niet). Klaar voor gebruik.<\u002Fdiv>\n    <\u002Fdiv>\n    <pre style=\"background:#0a2540; color:#e8eef4; font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.6; border-radius:14px; padding:22px 24px; overflow-x:auto; white-space:pre-wrap; word-break:break-word; margin:0;\">{{ code }}<\u002Fpre>\n\n    <!-- ===== UITLEG ===== -->\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:44px;\">\n      <div style=\"background:#fff; border:1px solid rgba(20,23,26,0.12); border-radius:18px; padding:26px 28px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#c4633a; margin-bottom:12px;\">Zo zet je 'm in Gmail<\u002Fdiv>\n        <ol style=\"margin:0; padding-left:20px; font-size:13px; line-height:1.7; color:#14171a;\">\n          <li style=\"margin-bottom:8px;\">Vul bovenaan je <strong style=\"color:#0a2540;\">naam, functie, mobiel en e-mail<\u002Fstrong> in.<\u002Fli>\n          <li style=\"margin-bottom:8px;\">Klik op <strong style=\"color:#0a2540;\">Kopieer handtekening<\u002Fstrong> (of selecteer en Ctrl/⌘+C).<\u002Fli>\n          <li style=\"margin-bottom:8px;\">Gmail → <strong style=\"color:#0a2540;\">Instellingen<\u002Fstrong> → <strong style=\"color:#0a2540;\">Alle instellingen bekijken<\u002Fstrong> → <strong style=\"color:#0a2540;\">Handtekening<\u002Fstrong> → <strong style=\"color:#0a2540;\">Nieuwe maken<\u002Fstrong>.<\u002Fli>\n          <li style=\"margin-bottom:0;\">Plak (Ctrl/⌘&nbsp;+&nbsp;V) en klik <strong style=\"color:#0a2540;\">Wijzigingen opslaan<\u002Fstrong>.<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid rgba(20,23,26,0.12); border-radius:18px; padding:26px 28px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#c4633a; margin-bottom:12px;\">Delen met het team<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:13px; line-height:1.7; color:rgba(20,23,26,0.75);\">\n          <li style=\"margin-bottom:8px;\">Deel <strong style=\"color:#0a2540;\">deze pagina als link<\u002Fstrong> (op je intranet of een interne URL). Iedereen vult bovenaan z'n eigen gegevens in en klikt Kopieer.<\u002Fli>\n          <li style=\"margin-bottom:8px;\">In <strong style=\"color:#0a2540;\">Notion<\u002Fstrong>: zet de <em style=\"font-style:italic;\">link naar deze pagina<\u002Fem>, niet de losse code — code plakken vanuit Notion verliest de opmaak.<\u002Fli>\n          <li style=\"margin-bottom:0;\">Logo, adres en social links staan vast; alleen naam, functie, mobiel en e-mail verschillen per persoon.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.sigRef = React.createRef();\n    // Gehoste PNG op de Webflow-CDN — werkt in Gmail (geen SVG).\n    this.LOGO_URL = 'https://cdn.prod.website-files.com/6a2688d87070476623bf3c1a/6a3cf9e477a58b0fef3401b8_cadform-logo-horizontaal-RGB.png';\n    this.state = {\n      code: '', mode: 'idle',\n      name: 'Lisa van der Berg',\n      role: 'Senior marketeer',\n      phone: '+31 6 12 34 56 78',\n      email: 'lisa@cadform.nl',\n    };\n  }\n\n  buildHtml() {\n    const node = this.sigRef.current;\n    if (!node) return '';\n    const clone = node.cloneNode(true);\n    // strip all tooling / framework attributes from the whole subtree\n    const all = [clone, ...clone.querySelectorAll('*')];\n    all.forEach(el => {\n      [...el.attributes].forEach(a => {\n        if (a.name.startsWith('data-dc') || a.name.startsWith('data-om') ||\n            a.name === 'data-screen-label' || a.name === 'data-dm-ref' ||\n            a.name === 'data-cc-id' || a.name === 'data-comment-anchor') {\n          el.removeAttribute(a.name);\n        }\n      });\n    });\n    const img = clone.querySelector('img');\n    if (img) img.setAttribute('src', this.LOGO_URL);\n    return clone.outerHTML;\n  }\n\n  componentDidMount() {\n    this.setState({ code: this.buildHtml() });\n  }\n\n  componentDidUpdate() {\n    // keep the code panel in sync with the edited fields\n    const c = this.buildHtml();\n    if (c && c !== this.state.code) this.setState({ code: c });\n  }\n\n  // Select the RENDERED signature and try to copy. The live node already uses the\n  // absolute CDN logo URL, so the clipboard carries real rich HTML (with the image) —\n  // pasting into Gmail yields the formatted signature, not the source code.\n  copy() {\n    const node = this.sigRef.current;\n    if (!node) return;\n    const sel = window.getSelection();\n    sel.removeAllRanges();\n    const range = document.createRange();\n    range.selectNode(node);\n    sel.addRange(range);\n    let ok = false;\n    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }\n    if (ok) {\n      sel.removeAllRanges();\n      this.setMode('copied');\n    } else {\n      // Copy is blocked in this sandbox — leave the selection visible so the\n      // user finishes with Ctrl/⌘+C on the highlighted signature.\n      this.setMode('select');\n    }\n  }\n\n  setMode(mode) {\n    this.setState({ mode });\n    clearTimeout(this.t);\n    if (mode === 'copied') {\n      this.t = setTimeout(() => this.setState({ mode: 'idle' }), 2600);\n    }\n  }\n\n  renderVals() {\n    const mode = this.state.mode || 'idle';\n    const telHref = 'tel:' + (this.state.phone || '').replace(/[^\\d+]/g, '');\n    const mailHref = 'mailto:' + (this.state.email || '').trim();\n    return {\n      sigRef: this.sigRef,\n      code: this.state.code,\n      name: this.state.name,\n      role: this.state.role,\n      phone: this.state.phone,\n      email: this.state.email,\n      telHref,\n      mailHref,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onRole: (e) => this.setState({ role: e.target.value }),\n      onPhone: (e) => this.setState({ phone: e.target.value }),\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      copy: () => this.copy(),\n      copyLabel: mode === 'copied' ? 'Gekopieerd — plak in Gmail'\n        : mode === 'select' ? 'Selectie staat klaar'\n        : 'Kopieer handtekening',\n      copyHint: mode === 'select'\n          ? 'Druk nu Ctrl/⌘+C om te kopiëren, en plak in Gmail (Ctrl/⌘+V).'\n          : mode === 'copied'\n          ? 'Plak in Gmail met Ctrl/⌘+V — de opmaak en het logo komen mee.'\n          : 'Kopieert de opgemaakte handtekening, mét logo.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
